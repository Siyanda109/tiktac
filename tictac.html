                background-color: #ff001e;

            #restar{
                 width: 100%;

                border-radius: 10px;
                background-color: #d2d2d2;
                color: #1e3c65;
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                box-shadow: 1px 1px 5px #1e3c65;
            }
        
        }
        .sign{
            background-color: #1e3c65;
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            

            h6{
                color: #ff001e;
                font-size: 2em;
                text-align: center;
                -webkit-text-stroke: 1px #FCEBE5;
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                margin-top: 50px;


            }
            .form{
                display: flex;
                flex-direction: column;
                width: 60%;
                justify-self: center;
                gap: 15px;
                margin-top: 50px;

                button{
                    background-color: #ff001e;
                    border: none;
                    border-radius: 10px;
                    padding: 10px 20px;
                    color: #FCEBE5;
                    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
                    font-weight: bolder;
                    letter-spacing: 5px;  
                }
                 input{
                    height: 40px;
                    border-radius: 10px;
                    border: 2px solid #ff001e;
                    text-align: center;
                 }
                button:hover{
                    transition: 1s ease-in-out;
                    background-color: #FCEBE5;
                    color: #ff001e;

                }


            }
            .logo{
                background-color: #FCEBE5;
                height: 70px;
                width: 70px;
                justify-self: center;
                border-radius: 50%;
                position: relative;
                font-size: 1.5em;
                margin-top: 25px;
                color: #ff001e;
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

                #thex{
                    position: absolute;
                    top: 15px;
                    left: 24px;
                }
                #theo{

                    top: 1px;
            
                }

            p{

            }

            background-color: #ff001e;
            width: 50%;

            padding: 15px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            border-radius: 10px;
            color: #d2d2d2;
            position: absolute;
            top: 1px;

            transition: 1s ease-in-out;

</head>

            signin.style.display = 'none'
